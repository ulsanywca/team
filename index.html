<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YWCA 업무스타일 테스트</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Pretendard", "Noto Sans KR", sans-serif;
  background: linear-gradient(180deg, #fff8ec 0%, #eefaf6 100%);
  color: #333;
}

.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 18px 60px;
}

.card {
  background: #fff;
  border-radius: 28px;
  padding: 28px 22px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.character {
  width: 190px;
  max-width: 75%;
  margin: 0 auto 14px;
  display: block;
}

.badge {
  display: inline-block;
  padding: 7px 14px;
  border-radius: 999px;
  background: #e1f4ee;
  color: #13876b;
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 12px;
}

h1 {
  font-size: 32px;
  line-height: 1.25;
  margin: 8px 0 12px;
  color: #174f46;
}

.subtitle {
  font-size: 16px;
  line-height: 1.7;
  color: #666;
  margin-bottom: 24px;
}

.start-btn,
.option-btn,
.restart-btn {
  border: none;
  cursor: pointer;
  border-radius: 18px;
  font-weight: 800;
  transition: 0.2s;
}

.start-btn {
  width: 100%;
  padding: 17px;
  font-size: 18px;
  background: #f5a623;
  color: #fff;
}

.start-btn:hover,
.option-btn:hover,
.restart-btn:hover {
  transform: translateY(-2px);
}

.progress {
  height: 12px;
  background: #e8eee9;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 22px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #47b39d, #f5a623);
  transition: 0.3s;
}

.question-no {
  color: #47b39d;
  font-weight: 900;
  margin-bottom: 10px;
}

.question {
  font-size: 22px;
  font-weight: 900;
  line-height: 1.45;
  color: #174f46;
  margin-bottom: 22px;
}

.option-btn {
  width: 100%;
  padding: 16px 16px;
  margin: 8px 0;
  background: #f8faf8;
  border: 2px solid #e1ebe6;
  color: #333;
  font-size: 16px;
  line-height: 1.5;
  text-align: left;
}

.option-btn:hover {
  background: #e9f7f2;
  border-color: #47b39d;
}

.result-type {
  font-size: 30px;
  font-weight: 900;
  color: #174f46;
  margin: 10px 0;
}

.result-desc {
  line-height: 1.8;
  color: #555;
  font-size: 16px;
  margin: 16px 0 22px;
  text-align: left;
}

.result-box {
  background: #f7fbf8;
  border-radius: 20px;
  padding: 18px;
  margin: 16px 0;
  text-align: left;
}

.result-box h3 {
  margin: 0 0 10px;
  color: #13876b;
  font-size: 18px;
}

.result-box ul {
  margin: 0;
  padding-left: 20px;
  line-height: 1.8;
}

.restart-btn {
  width: 100%;
  padding: 16px;
  margin-top: 18px;
  background: #174f46;
  color: #fff;
  font-size: 17px;
}

.small {
  font-size: 13px;
  color: #888;
  margin-top: 18px;
  line-height: 1.5;
}
</style>
</head>

<body>
<div class="wrap">

<section id="start" class="card">

  <div class="badge">YWCA Team Building Test</div>
  <h1>나는 어떤<br>업무스타일일까?</h1>
  <p class="subtitle">
    실제 업무 상황 속에서 내가 어떤 방식으로 일하는지 알아보는 테스트입니다.<br><br>
    결과를 통해 나의 강점과 협업 스타일을 확인하고,<br>
    우리 팀의 시너지를 찾아보세요.
  </p>
  <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
  <p class="small">※ 본 테스트는 팀빌딩과 자기이해를 위한 활동용 검사입니다.</p>
</section>

<section id="quiz" class="card" style="display:none;">

    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="question-no" id="questionNo"></div>
  <div class="question" id="questionText"></div>
  <div id="options"></div>
</section>

<section id="result" class="card" style="display:none;">

  <div class="badge">나의 업무스타일 결과</div>
  <div class="result-type" id="resultType"></div>
  <div class="result-desc" id="resultDesc"></div>

  <div class="result-box">
    <h3>강점</h3>
    <ul id="strengths"></ul>
  </div>

  <div class="result-box">
    <h3>협업 팁</h3>

  </div>

  <div class="result-box">
    <h3>찰떡 파트너</h3>
    <ul id="partners"></ul>
  </div>

  <button class="restart-btn" onclick="restartTest()">다시 테스트하기</button>
</section>

</div>

let current = 0;
let scores = {
  driver: 0,
  planner: 0,
  connector: 0,
  analyst: 0
};

function startTest() {
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  const q = questions[current];

  document.getElementById("questionNo").innerText = `${current + 1} / ${questions.length}`;
  document.getElementById("questionText").innerText = q.q;
  document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = option.text;
    btn.onclick = () => selectOption(option.type);
    optionsDiv.appendChild(btn);
  });
}

function selectOption(type) {
  scores[type]++;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";

  let topType = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const result = results[topType];

  document.getElementById("resultImage").src = result.image;
  document.getElementById("resultType").innerText = result.title;
  document.getElementById("resultDesc").innerText = result.desc;

  document.getElementById("strengths").innerHTML =
    result.strengths.map(item => `<li>${item}</li>`).join("");

  document.getElementById("tips").innerHTML =
    result.tips.map(item => `<li>${item}</li>`).join("");

  document.getElementById("partners").innerHTML =
    result.partners.map(item => `<li>${item}</li>`).join("");
}

function restartTest() {
  current = 0;
  scores = {
    driver: 0,
    planner: 0,
    connector: 0,
    analyst: 0
  };

  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>
</body>
</html>
